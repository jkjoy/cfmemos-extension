<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Memos 快速发送</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <textarea id="content" rows="6" placeholder="记点什么?用 #标签 打标签。"></textarea>

      <div class="row">
        <label class="toggle">
          <input type="checkbox" id="includePage" />
          <span>附加当前页面链接</span>
        </label>
        <select id="visibility">
          <option value="PRIVATE">仅自己</option>
          <option value="PROTECTED">登录可见</option>
          <option value="PUBLIC">公开</option>
        </select>
      </div>

      <div class="row actions">
        <span id="status" class="status"></span>
        <button id="submit" type="button">发送</button>
      </div>

      <a id="openOptions" href="#">设置</a>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
